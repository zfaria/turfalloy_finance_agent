services:

  postgres:
    image: postgres:15
    container_name: finance_postgres
    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    container_name: finance_bot
    restart: always

    depends_on:
      - postgres

    env_file:
      - .env

    volumes:
      - .:/app

    command: python main.py

volumes:
  postgres_data: